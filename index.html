<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ruhani Baby 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff758c;
            --secondary-pink: #ff7eb3;
            --text-dark: #4a4a4a;
            --bg-gradient: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Floating Hearts Animation */
        .hearts-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            animation: floatup 6s linear infinite;
        }

        @keyframes floatup {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 3rem 2rem;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            z-index: 10;
            transform: scale(0.95);
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            to { transform: scale(1); }
        }

        .greeting {
            font-family: 'Pacifico', cursive;
            font-size: 2.5rem;
            color: #ff4d6d;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(255, 77, 109, 0.2);
        }

        .sub-greeting {
            font-size: 1.2rem;
            color: var(--text-dark);
            margin-bottom: 2.5rem;
            font-weight: 600;
        }

        .question {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-bottom: 2rem;
            font-weight: 800;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        button {
            background: linear-gradient(45deg, var(--primary-pink), var(--secondary-pink));
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4);
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: all 0.4s ease;
        }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 117, 140, 0.6);
        }

        button:hover::after {
            left: 100%;
        }

        button:active {
            transform: translateY(1px);
        }

        #success-message {
            display: none;
            margin-top: 2rem;
            font-size: 1.8rem;
            font-family: 'Pacifico', cursive;
            color: #d90429;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="hearts-container" id="hearts-container"></div>

    <div class="card">
        <h1 class="greeting">I love you buddy 💖</h1>
        <p class="sub-greeting">For the sweetest Ruhani baby</p>
        
        <div id="interaction-area">
            <h2 class="question">Do you love me?</h2>
            <div class="buttons-container">
                <button onclick="showLove('Yes')">Yes! 🥰</button>
                <button onclick="showLove('Of course')">Of course! 💕</button>
                <button onclick="showLove('Obviously')">Obviously! 💖</button>
            </div>
        </div>

        <div id="success-message">
            I knew it! I love you more!!! 💖✨
        </div>
    </div>

    <script>
        // Generate floating hearts
        const heartsContainer = document.getElementById('hearts-container');
        const emojis = ['💖', '💕', '🥰', '✨', '💗', '💓'];
        
        setInterval(() => {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            
            // Random styling
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
            
            heartsContainer.appendChild(heart);
            
            // Remove after animation completes
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }, 300);

        // Handle button clicks
        function showLove(answer) {
            const interactionArea = document.getElementById('interaction-area');
            const successMessage = document.getElementById('success-message');
            
            // Create a burst of hearts from the center
            createBurst();
            
            interactionArea.style.display = 'none';
            successMessage.style.display = 'block';
            
            if (answer === 'Obviously') {
                successMessage.innerText = "Obviously! I love you the most! 💖💖💖";
            } else if (answer === 'Of course') {
                 successMessage.innerText = "Of course! You mean the world to me! 💕✨";
            } else {
                 successMessage.innerText = "I knew it! I love you more!!! 🥰💗";
            }
        }

        function createBurst() {
            for(let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('heart');
                    heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    heart.style.left = '50%';
                    heart.style.top = '50%';
                    
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 5 + Math.random() * 10;
                    const tx = Math.cos(angle) * velocity * 20;
                    const ty = Math.sin(angle) * velocity * 20;
                    
                    heart.style.transform = `translate(-50%, -50%)`;
                    heart.style.position = 'absolute';
                    heart.style.animation = 'none';
                    heart.style.transition = 'all 1s cubic-bezier(0.1, 0.8, 0.3, 1)';
                    heart.style.zIndex = '100';
                    
                    document.body.appendChild(heart);
                    
                    setTimeout(() => {
                        heart.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`;
                        heart.style.opacity = 0;
                    }, 10);
                    
                    setTimeout(() => {
                        heart.remove();
                    }, 1000);
                }, i * 20);
            }
        }
    </script>
</body>
</html>
